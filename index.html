<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boomatik AI Team - Miniverse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .header {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ff88;
      font-size: 14px;
      text-align: center;
      z-index: 100;
      text-shadow: 0 0 10px #00ff8855;
    }
    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .status-bar {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 11px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>BOOMATIK AI TEAM</h1>
      <span>team.boomatik.com</span>
    </div>
    <div class="status-bar">
      <span id="agent-count">0 agents online</span> |
      <span id="clock"></span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
